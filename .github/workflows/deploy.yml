name: CI-CD for Flask App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Basic syntax check
        run: |
          python -m py_compile five_dollar_app.py

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ec2-user/5-dollar-gift
            git pull --rebase origin main
            /usr/bin/python3.12 -m pip install --user -r requirements.txt

            oldpid=$(lsof -ti:5000)
            if [ -n "$oldpid" ]; then
              kill -9 $oldpid
            fi

            nohup /usr/bin/python3.12 five_dollar_app.py > app.log 2>&1 < /dev/null &